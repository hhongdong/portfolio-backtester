spring:
  application:
    name: portfolio-backtester
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/backtester}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        backtest.duration: true
      percentiles:
        backtest.duration: 0.5,0.95,0.99

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs

backtester:
  ingestion:
    provider: ${INGEST_PROVIDER:stub}
    alpha-vantage:
      api-key: ${ALPHA_VANTAGE_API_KEY:demo}
      base-url: https://www.alphavantage.co
  executor:
    core-pool-size: 2
    max-pool-size: 8
    queue-capacity: 50

resilience4j:
  retry:
    instances:
      priceData:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2.0
  circuitbreaker:
    instances:
      priceData:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.portfolio.backtester: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: INFO
